kind = "web"
previewPath = "/"
title = "Digital Fridge"
version = "1.0.0"
id = "artifacts/digital-fridge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23376

[services.development]
run = "pnpm --filter @workspace/digital-fridge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/digital-fridge", "run", "build" ]
publicDir = "artifacts/digital-fridge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23376"
BASE_PATH = "/"
